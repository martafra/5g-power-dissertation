# DU config using ru_dummy (no physical radio required)
f1ap:
  cu_cp_addr: 10.53.1.4
  bind_addr: 10.53.1.6

f1u:
  socket:
    -
      bind_addr: 172.18.10.3

ru_dummy:
  dl_processing_delay: 1
  time_scaling: 1

cell_cfg:
  dl_arfcn: 650000
  band: 78
  channel_bandwidth_MHz: 20
  common_scs: 30
  plmn: "00101"
  tac: 7
  pci: 1

log:
  filename: /tmp/du.log
  all_level: warning
